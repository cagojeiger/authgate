name: Vulnerability Full Scan (Non-Blocking)

on:
  workflow_dispatch:
  schedule:
    # Every Monday 10:00 KST (01:00 UTC)
    - cron: "0 1 * * 1"

permissions:
  contents: read

jobs:
  full-vuln-scan:
    name: Full Vulnerability Scan
    runs-on: arc-runner-set-authgate
    container: catthehacker/ubuntu:act-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run full govulncheck (non-blocking)
        id: vulnscan
        continue-on-error: true
        run: |
          govulncheck ./... 2>&1 | tee govulncheck-full.txt

      - name: Upload full scan report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: govulncheck-full-report
          path: govulncheck-full.txt

      - name: Write summary
        if: always()
        run: |
          echo "## Full Vulnerability Scan" >> "$GITHUB_STEP_SUMMARY"
          echo "- Scope: \`govulncheck ./...\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Blocking: no (informational workflow)" >> "$GITHUB_STEP_SUMMARY"
          echo "- Result: ${{ steps.vulnscan.outcome }}" >> "$GITHUB_STEP_SUMMARY"
