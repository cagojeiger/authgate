name: CI

on:
  pull_request:
    types: [opened, reopened, synchronize]
    branches: [main]
    paths:
      - "**/*.go"
      - "go.mod"
      - "go.sum"
      - "migrations/**"
      - "internal/db/queries/**"
      - "sqlc.yaml"
      - ".github/workflows/ci.yml"
      - "helm-charts/**"
  push:
    branches: [main]
    paths:
      - "**/*.go"
      - "go.mod"
      - "go.sum"
      - "migrations/**"
      - "internal/db/queries/**"
      - "sqlc.yaml"
      - ".github/workflows/ci.yml"
      - "helm-charts/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  actions: read
  pull-requests: write

jobs:
  sqlc:
    name: SQLC
    runs-on: arc-runner-set-authgate
    container: catthehacker/ubuntu:act-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Install sqlc
        run: go install github.com/sqlc-dev/sqlc/cmd/sqlc@v1.28.0

      - name: Enforce sqlc-only runtime DB access
        run: |
          if rg -n 'ExecContext\(|QueryRowContext\(|QueryContext\(|PrepareContext\(' \
            internal/storage \
            --glob '!**/storeq/**' \
            --glob '!**/*_test.go'; then
            echo "Direct SQL calls are not allowed in runtime storage code. Use sqlc queries in internal/db/queries and generated storeq."
            exit 1
          fi
          if rg -n 'parsePostgresArray|func \(a \*?StringArray\) (Scan|Value)\(' internal/storage; then
            echo "Manual postgres array parsers/scanners are not allowed. Use sqlc/driver array handling."
            exit 1
          fi

      - name: sqlc generate
        run: $(go env GOPATH)/bin/sqlc generate

      - name: Verify generated files are up to date
        run: |
          if ! git diff --exit-code -- internal/db/storeq; then
            echo "sqlc generated files are out of date. Run sqlc generate and commit results."
            exit 1
          fi

      - name: sqlc vet
        run: $(go env GOPATH)/bin/sqlc vet

  test:
    name: Test
    runs-on: arc-runner-set-authgate
    container: catthehacker/ubuntu:act-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build
        run: go build ./...

      - name: Run all tests with coverage
        run: go test -coverprofile=coverage.out -tags=integration ./internal/...

      - name: Upload coverage
        uses: actions/upload-artifact@v7
        with:
          name: code-coverage
          path: coverage.out

  coverage-report:
    name: Coverage Report
    needs: test
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - uses: actions/download-artifact@v8
        with:
          name: code-coverage
      - name: Write coverage summary
        run: |
          if [ ! -f coverage.out ]; then
            echo "No coverage artifact found." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          TOTAL_COVERAGE=$(go tool cover -func=coverage.out | awk '/^total:/ {print $3}')
          echo "## Coverage Report" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Total coverage: ${TOTAL_COVERAGE}" >> "$GITHUB_STEP_SUMMARY"

  vet:
    name: Go Vet
    runs-on: arc-runner-set-authgate
    container: catthehacker/ubuntu:act-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: go vet ./...

  helm:
    name: Helm Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: azure/setup-helm@v4
      - name: Helm lint
        run: helm lint helm-charts/authgate
      - name: Helm template (default values)
        run: helm template ci helm-charts/authgate --set secrets.oidcClientSecret=dummy > /dev/null
      - name: Helm template (external DB)
        run: |
          helm template ci helm-charts/authgate \
            --set postgresql.enabled=false \
            --set externalDatabase.existingSecret=ext-db \
            --set secrets.oidcClientSecret=dummy > /dev/null

  vuln:
    name: Vulnerability Check
    runs-on: arc-runner-set-authgate
    container: catthehacker/ubuntu:act-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          # integration/test utility packages pull docker/testcontainers only for tests.
          # Vulnerability checks here focus on runtime packages used in production code paths.
          PKGS=$(go list ./... | grep -v '/internal/testutil' | grep -v '/internal/integration')
          govulncheck ${PKGS}
