name: CI

on:
  pull_request:
    types: [opened, reopened, synchronize]
    branches: [main]
    paths:
      - "**/*.go"
      - "go.mod"
      - "go.sum"
      - "migrations/**"
      - "internal/storage/queries/**"
      - "sqlc.yaml"
      - ".github/workflows/ci.yml"
  push:
    branches: [main]
    paths:
      - "**/*.go"
      - "go.mod"
      - "go.sum"
      - "migrations/**"
      - "internal/storage/queries/**"
      - "sqlc.yaml"
      - ".github/workflows/ci.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  actions: read
  pull-requests: write

jobs:
  sqlc:
    name: SQLC
    runs-on: arc-runner-set-authgate
    container: catthehacker/ubuntu:act-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-go@v5.2.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Install sqlc
        run: go install github.com/sqlc-dev/sqlc/cmd/sqlc@v1.28.0

      - name: Enforce sqlc-only runtime DB access
        run: |
          if rg -n 'ExecContext\(|QueryRowContext\(|QueryContext\(|PrepareContext\(' \
            internal/storage \
            --glob '!**/storeq/**' \
            --glob '!**/*_test.go'; then
            echo "Direct SQL calls are not allowed in runtime storage code. Use sqlc queries in internal/storage/queries and generated storeq."
            exit 1
          fi
          if rg -n 'parsePostgresArray|func \(a \*?StringArray\) (Scan|Value)\(' internal/storage; then
            echo "Manual postgres array parsers/scanners are not allowed. Use sqlc/driver array handling."
            exit 1
          fi

      - name: sqlc generate
        run: $(go env GOPATH)/bin/sqlc generate

      - name: Verify generated files are up to date
        run: |
          if ! git diff --exit-code -- internal/storage/storeq; then
            echo "sqlc generated files are out of date. Run sqlc generate and commit results."
            exit 1
          fi

      - name: sqlc vet
        run: $(go env GOPATH)/bin/sqlc vet

  test:
    name: Test
    runs-on: arc-runner-set-authgate
    container: catthehacker/ubuntu:act-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-go@v5.2.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        run: go build ./...

      - name: Run all tests with coverage
        run: go test -coverprofile=coverage.out -tags=integration ./internal/...

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: code-coverage
          path: coverage.out

  coverage-report:
    name: Coverage Report
    needs: test
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/download-artifact@v4
        with:
          name: code-coverage
      - uses: fgrosse/go-coverage-report@v1.3.0
        with:
          coverage-artifact-name: code-coverage
          coverage-file-name: coverage.out
          root-package: github.com/kangheeyong/authgate

  vet:
    name: Go Vet
    runs-on: arc-runner-set-authgate
    container: catthehacker/ubuntu:act-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-go@v5.2.0
        with:
          go-version-file: go.mod
          cache: true
      - run: go vet ./...

  vuln:
    name: Vulnerability Check
    runs-on: arc-runner-set-authgate
    container: catthehacker/ubuntu:act-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-go@v5.2.0
        with:
          go-version-file: go.mod
          cache: true
      - run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          # integration/test utility packages pull docker/testcontainers only for tests.
          # Vulnerability checks here focus on runtime packages used in production code paths.
          PKGS=$(go list ./... | grep -v '/internal/testutil' | grep -v '/internal/integration')
          govulncheck ${PKGS}
