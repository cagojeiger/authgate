services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: authgate
      POSTGRES_USER: authgate
      POSTGRES_PASSWORD: authgate
    ports:
      - "5432:5432"
    volumes:
      - ./migrations/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U authgate"]
      interval: 2s
      timeout: 5s
      retries: 10

  demo-idp:
    image: ghcr.io/cagojeiger/mock-google-oidc:latest
    ports:
      - "8082:8082"
    environment:
      LISTEN_ADDR: ":8082"
      PUBLIC_URL: http://localhost:8082
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8082/.well-known/openid-configuration"]
      interval: 2s
      timeout: 5s
      retries: 10

  authgate:
    build: .
    depends_on:
      db:
        condition: service_healthy
      demo-idp:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://authgate:authgate@db:5432/authgate?sslmode=disable
      SESSION_SECRET: test-secret-32-chars-long-enough!
      PUBLIC_URL: http://localhost:8080
      DEV_MODE: "true"
      OIDC_ISSUER_URL: http://demo-idp:8082
      OIDC_CLIENT_ID: authgate
      OIDC_CLIENT_SECRET: ""
    ports:
      - "8080:8080"

  demo-app:
    build:
      context: .
      dockerfile: Dockerfile.demo
      args:
        DEMO_TARGET: app
    depends_on:
      - authgate
    ports:
      - "9090:9090"
    environment:
      LISTEN_ADDR: ":9090"
      AUTHGATE_PUBLIC_URL: http://localhost:8080
      AUTHGATE_INTERNAL_URL: http://authgate:8080
      CLIENT_ID: test-app
      CLI_CLIENT_ID: cli-client
      REDIRECT_URI: http://localhost:9090/callback

  demo-mcp:
    build:
      context: .
      dockerfile: Dockerfile.demo
      args:
        DEMO_TARGET: mcp
    depends_on:
      - authgate
    ports:
      - "9091:9091"
    environment:
      LISTEN_ADDR: ":9091"
      AUTHGATE_PUBLIC_URL: http://localhost:8080
      AUTHGATE_INTERNAL_URL: http://authgate:8080
      CLIENT_ID: mcp-client
