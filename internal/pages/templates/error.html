<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>authgate - Error</title>
<style>
  :root {
    --bg: #f4f7fb;
    --panel: rgba(255,255,255,0.95);
    --border: #d7e0ea;
    --text: #14202b;
    --muted: #5f6f82;
    --danger: #b42318;
    --danger-bg: #fff1f1;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    color: var(--text);
    background:
      radial-gradient(circle at top left, rgba(23,92,211,0.10), transparent 28%),
      radial-gradient(circle at bottom right, rgba(23,92,211,0.06), transparent 26%),
      var(--bg);
  }

  .shell {
    width: 100%;
    max-width: 500px;
    background: var(--panel);
    border: 1px solid rgba(255,255,255,0.72);
    border-radius: 22px;
    box-shadow: 0 28px 80px rgba(17, 24, 39, 0.12);
    overflow: hidden;
  }

  .topbar {
    padding: 14px 18px;
    border-bottom: 1px solid #eef2f7;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: rgba(255,255,255,0.72);
    backdrop-filter: blur(10px);
  }

  .brand {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.04em;
  }

  .context {
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .content {
    padding: 30px 28px;
    display: grid;
    gap: 18px;
    text-align: center;
  }

  .code {
    width: 82px;
    height: 82px;
    margin: 0 auto;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--danger-bg);
    color: var(--danger);
    font-size: 24px;
    font-weight: 800;
  }

  h1 {
    font-size: 28px;
    line-height: 1.2;
    letter-spacing: -0.02em;
  }

  p {
    color: var(--muted);
    font-size: 15px;
    line-height: 1.7;
    word-break: break-word;
  }

  .note {
    padding: 14px 16px;
    border-radius: 14px;
    border: 1px solid var(--border);
    background: #f8fafc;
    color: var(--muted);
    font-size: 14px;
    line-height: 1.6;
  }
</style>
</head>
<body>
<div class="shell">
  <div class="topbar">
    <div class="brand">authgate</div>
    <div class="context">Error</div>
  </div>

  <div class="content">
    <div class="code">{{.Code}}</div>
    <h1>Request could not be completed</h1>
    <p>{{.Message}}</p>
    <div class="note">
      If this error persists, restart the login flow from your application or terminal and try again.
    </div>
  </div>
</div>
</body>
</html>
