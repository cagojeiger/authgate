<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Authorize Device - authgate</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; }
        .container { background: white; border-radius: 12px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); max-width: 480px; width: 100%; padding: 40px; }
        .logo { text-align: center; margin-bottom: 30px; }
        .logo h1 { color: #667eea; font-size: 32px; margin: 0; }
        .code-box { background: #f0f0f0; padding: 20px; border-radius: 8px; text-align: center; font-size: 24px; font-weight: bold; letter-spacing: 4px; margin-bottom: 30px; }
        button { width: 100%; padding: 14px; border: none; border-radius: 6px; font-size: 16px; font-weight: 600; cursor: pointer; margin-bottom: 10px; }
        .btn-primary { background: #667eea; color: white; }
        .btn-secondary { background: #f0f0f0; color: #666; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <h1>authgate</h1>
            <p>Confirm Device Authorization</p>
        </div>
        <p style="text-align: center; color: #666; margin-bottom: 15px;">A CLI application is requesting access with this code:</p>
        <div class="code-box">{{.UserCode}}</div>
        <form method="POST" action="/device/approve">
            <input type="hidden" name="user_code" value="{{.UserCode}}">
            <button type="submit" name="action" value="approve" class="btn-primary">Allow</button>
            <button type="submit" name="action" value="deny" class="btn-secondary">Deny</button>
        </form>
    </div>
</body>
</html>
