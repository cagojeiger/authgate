<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Terms & Privacy - authgate</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; }
        .container { background: white; border-radius: 12px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); max-width: 480px; width: 100%; padding: 40px; }
        .logo { text-align: center; margin-bottom: 30px; }
        .logo h1 { color: #667eea; font-size: 32px; margin: 0; }
        .checkbox-group { margin: 20px 0; }
        .checkbox-group label { display: flex; align-items: flex-start; gap: 10px; cursor: pointer; margin-bottom: 12px; line-height: 1.5; color: #333; }
        .checkbox-group input[type="checkbox"] { margin-top: 4px; width: 18px; height: 18px; }
        a { color: #667eea; }
        button { width: 100%; padding: 14px; border: none; border-radius: 6px; font-size: 16px; font-weight: 600; cursor: pointer; background: #667eea; color: white; }
        button:disabled { background: #ccc; cursor: not-allowed; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <h1>authgate</h1>
            <p>Almost there</p>
        </div>
        <p style="color: #666; margin-bottom: 20px;">To continue, please review and accept our terms:</p>
        <form method="POST" action="/login/terms" id="termsForm">
            <input type="hidden" name="authRequestID" value="{{.AuthRequestID}}">
            <div class="checkbox-group">
                <label>
                    <input type="checkbox" name="terms_agree" required>
                    I agree to the <a href="/terms" target="_blank">Terms of Service</a> and <a href="/privacy" target="_blank">Privacy Policy</a>
                </label>
                <label>
                    <input type="checkbox" name="age_confirm" required>
                    I confirm that I am 13 years or older
                </label>
            </div>
            <button type="submit">Continue</button>
        </form>
    </div>
</body>
</html>
