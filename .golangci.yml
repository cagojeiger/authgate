version: "2"

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gosec
    - bodyclose
    - noctx

linters-settings:
  gosec:
    excludes:
      - G115  # integer overflow conversion — not relevant for this codebase

issues:
  exclude-rules:
    # Test files: allow hardcoded credentials and unhandled errors
    - path: "_test\\.go"
      linters: [gosec, errcheck]
    # Example code: allow hardcoded values
    - path: "examples/"
      linters: [gosec]
