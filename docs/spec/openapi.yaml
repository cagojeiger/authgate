openapi: 3.0.3
info:
  title: authgate API
  description: |
    Central authentication service for first-party applications.
    Supports web login via Google OIDC and CLI device authorization flow.
  version: 0.1.0
  contact:
    name: authgate Team

servers:
  - url: http://localhost:8080
    description: Local development server

paths:
  # OIDC Discovery
  /.well-known/openid-configuration:
    get:
      summary: OIDC Discovery Document
      description: Returns the OIDC configuration document containing all endpoints and supported features.
      operationId: getOIDCConfiguration
      tags:
        - Discovery
      responses:
        '200':
          description: OIDC configuration
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OIDCConfiguration'
              example:
                issuer: "http://localhost:8080"
                authorization_endpoint: "http://localhost:8080/oauth/authorize"
                token_endpoint: "http://localhost:8080/oauth/token"
                userinfo_endpoint: "http://localhost:8080/oauth/userinfo"
                jwks_uri: "http://localhost:8080/.well-known/jwks.json"
                revocation_endpoint: "http://localhost:8080/oauth/revoke"
                end_session_endpoint: "http://localhost:8080/oauth/logout"
                device_authorization_endpoint: "http://localhost:8080/oauth/device/authorize"
                response_types_supported: ["code"]
                grant_types_supported: ["authorization_code", "refresh_token", "urn:ietf:params:oauth:grant-type:device_code"]
                subject_types_supported: ["public"]
                id_token_signing_alg_values_supported: ["RS256"]
                token_endpoint_auth_methods_supported: ["client_secret_basic", "client_secret_post"]
                claims_supported: ["sub", "iss", "aud", "exp", "iat", "email", "email_verified", "name", "preferred_username"]

  /.well-known/jwks.json:
    get:
      summary: JSON Web Key Set
      description: Returns the public keys for JWT signature verification.
      operationId: getJWKS
      tags:
        - Discovery
      responses:
        '200':
          description: JWKS document
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JWKS'

  # OAuth2/OIDC Endpoints
  /oauth/authorize:
    get:
      summary: Authorization Endpoint
      description: |
        Initiates the OAuth2 authorization flow. Redirects to Google OIDC for authentication.
        Supports PKCE (required for public clients).
      operationId: authorize
      tags:
        - OAuth2
      parameters:
        - name: response_type
          in: query
          required: true
          schema:
            type: string
            enum: [code]
          description: Must be 'code' for authorization code flow
        - name: client_id
          in: query
          required: true
          schema:
            type: string
          description: Registered client ID
        - name: redirect_uri
          in: query
          required: true
          schema:
            type: string
            format: uri
          description: Must match registered redirect URI
        - name: scope
          in: query
          required: false
          schema:
            type: string
            default: "openid profile email"
          description: Space-separated list of scopes
        - name: state
          in: query
          required: true
          schema:
            type: string
            minLength: 16
          description: Opaque value for CSRF protection
        - name: code_challenge
          in: query
          required: true
          schema:
            type: string
          description: PKCE code challenge (S256)
        - name: code_challenge_method
          in: query
          required: true
          schema:
            type: string
            enum: [S256]
          description: PKCE method (must be S256)
        - name: nonce
          in: query
          required: false
          schema:
            type: string
          description: Optional nonce for ID token validation
      responses:
        '302':
          description: Redirect to Google OIDC or login page
          headers:
            Location:
              schema:
                type: string
              description: Redirect URL
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /oauth/callback:
    get:
      summary: OAuth Callback
      description: Handles the callback from Google OIDC after user authentication.
      operationId: callback
      tags:
        - OAuth2
      parameters:
        - name: code
          in: query
          required: false
          schema:
            type: string
          description: Authorization code from IdP
        - name: state
          in: query
          required: false
          schema:
            type: string
          description: State parameter from original request
        - name: error
          in: query
          required: false
          schema:
            type: string
          description: Error code if authentication failed
        - name: error_description
          in: query
          required: false
          schema:
            type: string
          description: Human-readable error description
      responses:
        '302':
          description: Redirect to client redirect_uri with code or error
          headers:
            Location:
              schema:
                type: string
        '400':
          $ref: '#/components/responses/BadRequest'

  /oauth/token:
    post:
      summary: Token Endpoint
      description: |
        Exchange authorization code for tokens, refresh access tokens,
        or exchange device code for tokens.
      operationId: token
      tags:
        - OAuth2
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenRequest'
          application/json:
            schema:
              $ref: '#/components/schemas/TokenRequest'
      responses:
        '200':
          description: Token response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
              examples:
                authorization_code:
                  summary: Authorization Code Exchange
                  value:
                    access_token: "eyJhbGciOiJSUzI1NiIsInR5cCI6IkpXVCJ9..."
                    token_type: "Bearer"
                    expires_in: 900
                    refresh_token: "opaque_refresh_token_string"
                    id_token: "eyJhbGciOiJSUzI1NiIsInR5cCI6IkpXVCJ9..."
                    scope: "openid profile email"
                refresh_token:
                  summary: Refresh Token Exchange
                  value:
                    access_token: "eyJhbGciOiJSUzI1NiIsInR5cCI6IkpXVCJ9..."
                    token_type: "Bearer"
                    expires_in: 900
                    refresh_token: "new_rotated_refresh_token_string"
                    scope: "openid profile email"
                device_code:
                  summary: Device Code Exchange
                  value:
                    access_token: "eyJhbGciOiJSUzI1NiIsInR5cCI6IkpXVCJ9..."
                    token_type: "Bearer"
                    expires_in: 900
                    refresh_token: "opaque_refresh_token_string"
                    scope: "openid profile email"
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /oauth/revoke:
    post:
      summary: Revoke Token
      description: Revokes an access or refresh token.
      operationId: revoke
      tags:
        - OAuth2
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                token:
                  type: string
                  description: Token to revoke
                token_type_hint:
                  type: string
                  enum: [access_token, refresh_token]
                  description: Optional hint about token type
      responses:
        '200':
          description: Token revoked (or was already invalid)
        '401':
          $ref: '#/components/responses/Unauthorized'

  /oauth/logout:
    get:
      summary: Logout
      description: |
        Initiates logout. Clears central session and redirects to post_logout_redirect_uri.
      operationId: logout
      tags:
        - OAuth2
      parameters:
        - name: id_token_hint
          in: query
          required: false
          schema:
            type: string
          description: ID token hint for validation
        - name: post_logout_redirect_uri
          in: query
          required: false
          schema:
            type: string
            format: uri
          description: Where to redirect after logout
        - name: state
          in: query
          required: false
          schema:
            type: string
          description: State to return after logout
      responses:
        '302':
          description: Redirect to post_logout_redirect_uri
          headers:
            Location:
              schema:
                type: string

  /oauth/userinfo:
    get:
      summary: UserInfo Endpoint
      description: Returns claims about the authenticated user.
      operationId: userinfo
      tags:
        - OAuth2
      security:
        - bearerAuth: []
      responses:
        '200':
          description: User information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserInfo'
              example:
                sub: "usr_123"
                email: "user@example.com"
                email_verified: true
                name: "Kang"
                preferred_username: "kang"
        '401':
          $ref: '#/components/responses/Unauthorized'

  # Device Authorization Flow
  /oauth/device/authorize:
    post:
      summary: Device Authorization Request
      description: |
        Initiates the device authorization flow for CLI applications.
        Returns device_code and user_code for polling.
      operationId: deviceAuthorize
      tags:
        - Device Flow
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                client_id:
                  type: string
                  description: Registered client ID
                scope:
                  type: string
                  description: Space-separated scopes
      responses:
        '200':
          description: Device authorization response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeviceAuthorizationResponse'
              example:
                device_code: "GmRhmhcxhwAzkoEqiMEg_DnyEysNkuNhszIySk9eS"
                user_code: "WDJB-MJHT"
                verification_uri: "http://localhost:8080/device"
                verification_uri_complete: "http://localhost:8080/device?user_code=WDJB-MJHT"
                expires_in: 1800
                interval: 5
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /oauth/device:
    get:
      summary: Device Verification Page
      description: HTML page for user to enter user_code and approve device.
      operationId: deviceVerificationPage
      tags:
        - Device Flow
      parameters:
        - name: user_code
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: HTML verification page
          content:
            text/html:
              schema:
                type: string

  # Health Check
  /health:
    get:
      summary: Health Check
      description: Returns service health status.
      operationId: health
      tags:
        - Health
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "healthy"
                  timestamp:
                    type: string
                    format: date-time

  /ready:
    get:
      summary: Readiness Check
      description: Returns whether the service is ready to accept traffic.
      operationId: ready
      tags:
        - Health
      responses:
        '200':
          description: Service is ready
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "ready"
                  checks:
                    type: object
                    properties:
                      database:
                        type: string
                        example: "connected"
                      cache:
                        type: string
                        example: "connected"
        '503':
          description: Service is not ready

components:
  schemas:
    OIDCConfiguration:
      type: object
      required:
        - issuer
        - authorization_endpoint
        - token_endpoint
        - jwks_uri
      properties:
        issuer:
          type: string
          format: uri
        authorization_endpoint:
          type: string
          format: uri
        token_endpoint:
          type: string
          format: uri
        userinfo_endpoint:
          type: string
          format: uri
        jwks_uri:
          type: string
          format: uri
        revocation_endpoint:
          type: string
          format: uri
        end_session_endpoint:
          type: string
          format: uri
        device_authorization_endpoint:
          type: string
          format: uri
        response_types_supported:
          type: array
          items:
            type: string
        grant_types_supported:
          type: array
          items:
            type: string
        subject_types_supported:
          type: array
          items:
            type: string
        id_token_signing_alg_values_supported:
          type: array
          items:
            type: string
        token_endpoint_auth_methods_supported:
          type: array
          items:
            type: string
        claims_supported:
          type: array
          items:
            type: string

    JWKS:
      type: object
      required:
        - keys
      properties:
        keys:
          type: array
          items:
            type: object
            properties:
              kty:
                type: string
              use:
                type: string
              kid:
                type: string
              alg:
                type: string
              n:
                type: string
              e:
                type: string
              x:
                type: string
              y:
                type: string

    TokenRequest:
      type: object
      required:
        - grant_type
      properties:
        grant_type:
          type: string
          enum:
            - authorization_code
            - refresh_token
            - urn:ietf:params:oauth:grant-type:device_code
        code:
          type: string
          description: Authorization code (for authorization_code grant)
        redirect_uri:
          type: string
          description: Redirect URI (for authorization_code grant)
        code_verifier:
          type: string
          description: PKCE code verifier (for authorization_code grant)
        refresh_token:
          type: string
          description: Refresh token (for refresh_token grant)
        device_code:
          type: string
          description: Device code (for device_code grant)
        client_id:
          type: string
          description: Client ID
        client_secret:
          type: string
          description: Client secret (for confidential clients)

    TokenResponse:
      type: object
      required:
        - access_token
        - token_type
        - expires_in
      properties:
        access_token:
          type: string
          description: JWT access token
        token_type:
          type: string
          enum: [Bearer]
        expires_in:
          type: integer
          description: Token lifetime in seconds
        refresh_token:
          type: string
          description: Opaque refresh token
        id_token:
          type: string
          description: JWT ID token
        scope:
          type: string
          description: Granted scopes

    UserInfo:
      type: object
      required:
        - sub
      properties:
        sub:
          type: string
          description: User ID (subject)
        email:
          type: string
          format: email
        email_verified:
          type: boolean
        name:
          type: string
        preferred_username:
          type: string
        given_name:
          type: string
        family_name:
          type: string
        picture:
          type: string
          format: uri

    DeviceAuthorizationResponse:
      type: object
      required:
        - device_code
        - user_code
        - verification_uri
        - expires_in
      properties:
        device_code:
          type: string
          description: Device code for polling
        user_code:
          type: string
          description: Short code for user to enter
        verification_uri:
          type: string
          format: uri
          description: URL where user enters code
        verification_uri_complete:
          type: string
          format: uri
          description: URL with pre-filled user_code
        expires_in:
          type: integer
          description: Expiration time in seconds
        interval:
          type: integer
          description: Polling interval in seconds

    Error:
      type: object
      required:
        - error
      properties:
        error:
          type: string
          enum:
            - invalid_request
            - invalid_client
            - invalid_grant
            - unauthorized_client
            - unsupported_grant_type
            - invalid_scope
            - access_denied
            - server_error
            - temporarily_unavailable
            - authorization_pending
            - slow_down
            - expired_token
        error_description:
          type: string
        error_uri:
          type: string
          format: uri

  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: "invalid_request"
            error_description: "Missing required parameter: client_id"

    Unauthorized:
      description: Authentication required or failed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: "invalid_grant"
            error_description: "Invalid authorization code"

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT access token
